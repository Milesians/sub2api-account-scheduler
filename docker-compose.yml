services:
  scheduler:
    build: .
    container_name: sub2api-account-scheduler
    restart: unless-stopped
    environment:
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-}
      SUB2API_ADMIN_KEY: ${SUB2API_ADMIN_KEY:-}
      DB_PATH: ${DB_PATH:-/data/scheduler.db}
      HEARTBEAT_FILE: ${HEARTBEAT_FILE:-/data/last_tick}
      UI_ENABLED: ${UI_ENABLED:-true}
      UI_HOST: ${UI_HOST:-0.0.0.0}
      UI_PORT: ${UI_PORT:-18080}
    ports:
      - "${UI_PORT:-18080}:${UI_PORT:-18080}"
    volumes:
      - ./data:/data                         # SQLite 库 + 心跳文件
      - ./config.yaml:/app/config.yaml:ro    # 策略参数（改后重启生效）
