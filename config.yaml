# sub2api 账号 7day 节奏控制器 策略参数（非敏感）
# 敏感项（SUB2API_BASE_URL / SUB2API_ADMIN_KEY）只通过环境变量传入

platform: openai              # anthropic / openai，每个实例管理一个平台
account_name_pattern: 'pay\d+'         # 受控账号名称过滤（正则，re.search 匹配）；空 = 全部账号受控

interval_minutes: 15
target_7d_utilization: 97.0      # legacy；未配置 pacing_target_7d_utilization 时用于兼容
enable_5h_guard: false           # 5h 保护默认交给 sub2api 原生运行时
pacing_target_7d_utilization: 97.0
drain_target_7d_utilization: 99.4
hard_cap_7d_utilization: 99.8
hard_cap_5h_utilization: 98.0
protect_7d_utilization: 97.0
max_boost_ratio: 0.15
mild_boost_ratio: 0.35
max_boost_min: 1
boost_load_factor_multiplier: 3.0
mild_load_factor_multiplier: 2.0
max_load_factor: 100
max_active_probes_per_round: 10
usage_stale_threshold_minutes: 90
cooldown_minutes: 60
safe_tail_hours: 2.0
warmup_hours: 24.0              # 窗口重置后的预热时长：elapsed 不足时按比例折减 projected_gap，避免刚重置（近期速率≈0）的号缺口虚高霸占强力名额
strong_score_threshold: 3.0
strong_min_required_rate: 0.6  # 强力补量最低需要速率（%/h）：required_rate 低于此值的号不进强力（仍可温和），避免给跑道充裕、本不需高速率的号强力补量
mild_score_threshold: 1.0
ahead_band_pp: 3.0
cooldown_abs_rate_pph: 1.2
cooldown_required_rate_multiplier: 2.5
cooldown_near_target_band_pp: 2.0
will_hit_goal_soon_hours: 5.0
emergency_window_hours: 12       # 剩余小时低于此值允许跳档补量
emergency_projected_end_threshold: 94.0
emergency_final_gap_pp: 5.0
emergency_rate_gap_pph: 0.8
terminal_drain_enabled: true
terminal_window_hours: 36.0
terminal_final_margin_hours: 0.25
terminal_min_runway_hours: 0.25
terminal_strong_gap_pp: 1.5
terminal_mild_gap_pp: 0.4
terminal_strong_required_rate_pph: 0.35
terminal_mild_required_rate_pph: 0.10
terminal_strong_pressure: 1.8
terminal_mild_pressure: 0.9
terminal_done_band_pp: 0.10
terminal_min_recent_rate_pph: 0.05
terminal_dynamic_load_factor_enabled: true
terminal_strong_load_factor_multiplier: 4.0
terminal_mild_load_factor_multiplier: 2.5
terminal_normal_load_factor_multiplier: 1.5
terminal_max_load_factor: 100
terminal_usage_stale_threshold_minutes: 20
terminal_max_active_probes_per_round: 50
terminal_active_probe_ratio: 0.50
terminal_min_active_probes_per_round: 20
terminal_interval_minutes: 15

# priority 档位：基准 1000，手动管理的账号请使用 < 1000 的 priority，
# 不会与受控档位冲突（sub2api priority 数值越小越优先）
priority_bands: [1010, 1030, 1050, 1070, 1099]

# 存储与老化（容器内路径；本地开发用 DB_PATH 环境变量覆盖）
db_path: /data/scheduler.db
heartbeat_file: /data/last_tick
sample_retention_days: 14        # usage_sample 保留期
decision_retention_days: 30      # decision_log 保留期
state_retention_days: 30         # 账号消失后 account_state 行保留期
